<div class="map-container-wrapper">
  <!-- Map Instance -->
  <div id="map"></div>

  <!-- Left: Capas de Datos -->
  <div class="floating-panel" style="top: 20px; left: 20px; width: 280px;">
    <div class="panel-title">Capas de Datos</div>
    <div id="map-toggles-container">
      <!-- Generado dinámicamente o estructurado aquí -->
      <label class="toggle-row">
        <span><i class="fa-solid fa-fire" style="color: #FF0000"></i> Focos de Calor</span>
        <div class="switch">
          <input type="checkbox" id="layer-fuego" checked>
          <span class="slider"></span>
        </div>
      </label>
      <label class="toggle-row">
        <span><i class="fa-solid fa-wind" style="color: #800080"></i> Calidad del Aire</span>
        <div class="switch">
          <input type="checkbox" id="layer-aire" checked>
          <span class="slider"></span>
        </div>
      </label>
      <label class="toggle-row">
        <span><i class="fa-solid fa-house-crack" style="color: #8B4513"></i> Sismos</span>
        <div class="switch">
          <input type="checkbox" id="layer-sismo" checked>
          <span class="slider"></span>
        </div>
      </label>
      <label class="toggle-row">
        <span><i class="fa-solid fa-person-through-window" style="color: #000000"></i> Bloqueos de Tráfico</span>
        <div class="switch">
          <input type="checkbox" id="layer-bloqueo" checked>
          <span class="slider"></span>
        </div>
      </label>
    </div>
  </div>



  <!-- Top Right: Legend (AQI) -->
  <div class="floating-panel" style="top: 20px; right: 20px; padding: 0.8rem; display: flex; align-items: center; gap: 0.8rem;">
    <div style="font-size: 0.85rem; font-weight: bold;">AQI (ica)</div>
    <div style="width: 120px; height: 10px; border-radius: 5px; background: linear-gradient(to right, #00E400, #FFFF00, #FF7E00, #FF0000, #8F3F97, #7E0023);"></div>
  </div>
</div>
