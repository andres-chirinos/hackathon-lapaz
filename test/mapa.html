<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuntur - Mapa Interactivo</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --bg-base: #F8F9FA; --bg-surface: #FFFFFF; --text-primary: #212529;
            --text-secondary: #6C757D; --border-color: #E9ECEF; --brand-blue: #0056B3;
            --brand-cyan: #00E5FF; --alert-critical: #EF4444;
        }
        [data-theme="dark"] {
            --bg-base: #121212; --bg-surface: #1E1E1E; --text-primary: #F8F9FA;
            --text-secondary: #A0AAB2; --border-color: #2D333B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-base); color: var(--text-primary); }

        /* Encabezado */
        header { background-color: var(--bg-surface); border-bottom: 1px solid var(--border-color); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--brand-blue); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        
        /* Mapa y Filtros */
        #map { height: calc(100vh - 80px); width: 100%; z-index: 1; }
        .filter-panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        .filter-item { margin-bottom: 8px; display: flex; align-items: center; cursor: pointer; }
        
        /* Iconos mapa */
        .custom-icon { display: flex; justify-content: center; align-items: center; border-radius: 50%; border: 2px solid white; color: white; font-size: 14px; }
        .icon-bloqueo { border-radius: 0; border: 2px dashed black; background: #eee !important; color: black !important; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo"><i class="ph-fill ph-paper-plane-tilt"></i> KUNTUR</a>
        <button id="theme-btn" style="background:none; border:none; cursor:pointer; font-size:1.5rem; color:var(--text-primary);">
            <i class="ph ph-moon"></i>
        </button>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-16.5000, -68.1193], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

        const categorias = {
            fuego: { color: '#FF0000', icon: 'fa-fire', nombre: 'Incendio', capa: L.layerGroup().addTo(map) },
            sismo: { color: '#8B4513', icon: 'fa-house-crack', nombre: 'Sismo', capa: L.layerGroup().addTo(map) },
            aire: { color: '#800080', icon: 'fa-wind', nombre: 'Calidad del Aire', capa: L.layerGroup().addTo(map) },
            bloqueo: { color: '#000000', icon: 'fa-person-through-window', nombre: 'Bloqueo', capa: L.layerGroup().addTo(map) }
        };

        const misPuntos = [
            { lat: -16.500, lng: -68.119, tipo: 'fuego', titulo: 'Incendio Activo', desc: 'Fuego en zona forestal.' },
            { lat: -16.505, lng: -68.125, tipo: 'sismo', titulo: 'Epicentro', desc: 'Sismo grado 3.5 registrado.' },
            { lat: -16.495, lng: -68.115, tipo: 'aire', titulo: 'Calidad Mala', desc: 'Niveles de contaminación muy altos.' },
            { lat: -16.490, lng: -68.120, tipo: 'bloqueo', titulo: 'Bloqueo Vía', desc: 'Corte de ruta principal.' }
        ];

        misPuntos.forEach(p => {
            const cat = categorias[p.tipo];
            const esBloqueo = p.tipo === 'bloqueo';
            const icono = L.divIcon({
                className: `custom-icon ${esBloqueo ? 'icon-bloqueo' : ''}`,
                html: `<i class="fa-solid ${cat.icon}"></i>`,
                iconSize: [30, 30],
                style: `background-color: ${cat.color};`
            });
            L.marker([p.lat, p.lng], {icon: icono}).bindPopup(`<b>${p.titulo}</b><br>${p.desc}`).addTo(cat.capa);
        });

        // Control de Filtros
        const filterPanel = L.control({position: 'topright'});
        filterPanel.onAdd = function() {
            const div = L.DomUtil.create('div', 'filter-panel');
            div.innerHTML = '<strong>Filtros:</strong><br>';
            Object.keys(categorias).forEach(key => {
                const cat = categorias[key];
                const label = L.DomUtil.create('label', 'filter-item', div);
                const check = L.DomUtil.create('input', '', label);
                check.type = 'checkbox'; check.checked = true;
                check.onclick = function() { this.checked ? map.addLayer(cat.capa) : map.removeLayer(cat.capa); };
                label.innerHTML += `<i class="fa-solid ${cat.icon}" style="color:${cat.color}; margin: 0 10px;"></i> ${cat.nombre}`;
            });
            return div;
        };
        filterPanel.addTo(map);

        // Lógica de tema
        document.getElementById('theme-btn').addEventListener('click', (e) => {
            const html = document.documentElement;
            const icon = e.currentTarget.querySelector('i');
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            icon.className = isDark ? 'ph ph-moon' : 'ph ph-sun';
        });
    </script>
</body>
</html>
