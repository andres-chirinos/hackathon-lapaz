<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuntur - Aplicación de Monitoreo</title>
    
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* Sistema de Diseño: 12 Variables CSS en :root */
        :root {
            --bg-base: #F8F9FA;
            --bg-surface: #FFFFFF;
            --text-primary: #212529;
            --text-secondary: #6C757D;
            --border-color: #E9ECEF;
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            
            --brand-blue: #0056B3;
            --brand-cyan: #00E5FF;
            --alert-critical: #EF4444; 
            --alert-warning: #F97316; 
            --alert-toxic: #9333EA; 
            --alert-stable: #22C55E; 
        }

        [data-theme="dark"] {
            --bg-base: #121212;
            --bg-surface: #1E1E1E;
            --text-primary: #F8F9FA;
            --text-secondary: #A0AAB2;
            --border-color: #2D333B;
            --shadow-card: none;
            --brand-blue: #3399FF; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-base); color: var(--text-primary); line-height: 1.5; }

        /* Encabezado y Navegación */
        header {
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 2.5rem; }
        .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.5rem; font-weight: 700; color: var(--brand-blue); text-decoration: none; }
        .logo i { color: var(--brand-cyan); font-size: 1.8rem; }

        .main-nav { display: flex; gap: 1.5rem; }
        .main-nav a { text-decoration: none; color: var(--text-secondary); font-weight: 600; font-size: 0.95rem; cursor: pointer;}
        .main-nav a.active { color: var(--brand-blue); border-bottom: 2px solid var(--brand-blue); padding-bottom: 4px; }
        .main-nav a:hover { color: var(--brand-blue); }

        .controls { display: flex; align-items: center; gap: 1rem; }
        .municipio-select {
            padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border-color);
            background-color: var(--bg-base); color: var(--text-primary); font-weight: 600; cursor: pointer;
        }
        .theme-toggle { background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer; }

        main { max-width: 1200px; margin: 0 auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }

        /* Vistas SPA */
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Alerta Dinámica */
        .alert-banner {
            background-color: rgba(239, 68, 68, 0.1); border-left: 4px solid var(--alert-critical);
            padding: 1rem 1.5rem; border-radius: 8px; display: none; justify-content: space-between; align-items: center;
        }
        .alert-content { display: flex; align-items: center; gap: 1rem; color: var(--alert-critical); }
        .alert-btn { background-color: var(--alert-critical); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; cursor: pointer; }

        /* Dashboard */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .card {
            background-color: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 1.5rem; box-shadow: var(--shadow-card);
            display: flex; flex-direction: column; gap: 1rem;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; color: var(--text-secondary); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; }
        .card-value { font-size: 2.5rem; font-weight: 700; color: var(--text-primary); }

        /* SVG Gráficos */
        .gauge-container { position: relative; width: 100%; height: 90px; display: flex; justify-content: center; overflow: hidden; }
        .gauge-svg { width: 160px; height: 160px; }
        .gauge-bg { fill: none; stroke: var(--border-color); stroke-width: 14; }
        .gauge-val { fill: none; stroke: url(#aqi-gradient); stroke-width: 14; stroke-dasharray: 125.6; stroke-dashoffset: 125.6; stroke-linecap: round; transition: stroke-dashoffset 1s ease-out; }
        .gauge-text { position: absolute; bottom: 0; font-size: 2rem; font-weight: bold; color: var(--text-primary); }
        
        .sparkline { width: 100%; height: 40px; margin-top: 5px; }
        .sparkline path { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }

        /* Lista de Bloqueos */
        .blockade-list { list-style: none; display: flex; flex-direction: column; gap: 0.8rem; }
        .blockade-list li { display: flex; align-items: center; gap: 0.8rem; font-size: 0.95rem; font-weight: 600; }
        .blockade-list i { font-size: 1.2rem; color: var(--alert-critical); }

        /* Mapa y Filtros */
        #map { height: 600px; width: 100%; z-index: 1; border-radius: 12px; border: 1px solid var(--border-color); }
        .filter-panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.3); color: #333; }
        .filter-item { margin-bottom: 8px; display: flex; align-items: center; cursor: pointer; }
        
        /* Iconos mapa */
        .custom-icon { display: flex; justify-content: center; align-items: center; border-radius: 50%; border: 2px solid white; color: white; font-size: 14px; }
        .icon-bloqueo { border-radius: 0; border: 2px dashed black; background: #eee !important; color: black !important; }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 1rem; }
            .header-left { flex-direction: column; width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="#" class="logo">
                <i class="ph-fill ph-paper-plane-tilt"></i> KUNTUR
            </a>
            <nav class="main-nav">
                <a class="active" onclick="showView('principal')">Principal</a>
                <a onclick="showView('mapa')">Mapa Interactivo</a>
            </nav>
        </div>
        <div class="controls">
            <select class="municipio-select" id="municipio-select">
                <option value="" disabled selected>Seleccione Municipio...</option>
            </select>
            <button class="theme-toggle" id="theme-btn">
                <i class="ph ph-moon"></i>
            </button>
        </div>
    </header>

    <main>
        <section class="alert-banner" id="alert-banner">
            <div class="alert-content">
                <i class="ph-fill ph-warning-circle" style="font-size: 1.8rem;"></i>
                <div>
                    <strong>Alerta en su Zona</strong>
                    <p id="alert-text">Evento crítico detectado cerca a su ubicación.</p>
                </div>
            </div>
            <button class="alert-btn">Ver Detalles</button>
        </section>

        <!-- View: Principal -->
        <div id="view-principal" class="view-section active">
            <section class="dashboard-grid">
                <article class="card">
                    <div class="card-header">
                        Calidad del Aire (AQI)
                        <i class="ph ph-wind" style="color: var(--alert-toxic); font-size: 1.5rem;"></i>
                    </div>
                    <div class="gauge-container">
                        <svg class="gauge-svg" viewBox="0 0 100 50">
                            <defs>
                                <linearGradient id="aqi-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#22C55E" /> 
                                    <stop offset="50%" stop-color="#F97316" /> 
                                    <stop offset="100%" stop-color="#9333EA" /> 
                                </linearGradient>
                            </defs>
                            <path class="gauge-bg" d="M 10 40 A 30 30 0 0 1 90 40" />
                            <path class="gauge-val" id="gauge-val-path" d="M 10 40 A 30 30 0 0 1 90 40" />
                        </svg>
                        <div class="gauge-text" id="dashboard-aqi">--</div>
                    </div>
                </article>

                <article class="card">
                    <div class="card-header">
                        Último Sismo
                        <i class="ph ph-activity" style="color: var(--brand-cyan); font-size: 1.5rem;"></i>
                    </div>
                    <div class="card-value"><span id="dashboard-seismic">--</span><span style="font-size: 1rem; color: var(--text-secondary);"> Mag</span></div>
                    <svg class="sparkline" viewBox="0 0 100 30">
                        <path d="M0,25 L10,25 L15,10 L20,30 L25,5 L30,25 L100,25" stroke="var(--brand-cyan)" />
                    </svg>
                </article>

                <article class="card">
                    <div class="card-header">
                        Puntos de Bloqueo
                        <i class="ph ph-barricade" style="color: var(--alert-critical); font-size: 1.5rem;"></i>
                    </div>
                    <div class="card-value" id="dashboard-blockades">--</div>
                    <ul class="blockade-list" id="blockade-list-details">
                        <!-- Populated by JS -->
                    </ul>
                </article>
            </section>
        </div>

        <!-- View: Mapa Interactivo -->
        <div id="view-mapa" class="view-section">
            <div id="map"></div>
        </div>

    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 1. SPA Navigation ---
        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            
            document.querySelectorAll('.main-nav a').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');

            if (viewId === 'mapa') {
                setTimeout(() => map.invalidateSize(), 200); // Fix map size issue when initially hidden
            }
        }

        // --- 2. Data Fetching ---
        const API_URL = 'http://localhost:8000/api';

        async function fetchDashboardData() {
            try {
                const res = await fetch(`${API_URL}/dashboard_data`);
                const data = await res.json();
                
                // AQI
                document.getElementById('dashboard-aqi').innerText = data.aqi;
                // Update Gauge (Max AQI ~ 300)
                const pct = Math.min(data.aqi / 300, 1);
                const offset = 125.6 - (125.6 * pct);
                document.getElementById('gauge-val-path').style.strokeDashoffset = offset;

                // Seismic
                document.getElementById('dashboard-seismic').innerText = data.seismic_mag;
                
                // Blockades
                document.getElementById('dashboard-blockades').innerText = data.blockades;
                if(data.blockades > 0) {
                    document.getElementById('blockade-list-details').innerHTML = `<li><i class="ph-fill ph-traffic-signal" style="color: var(--alert-critical);"></i> ${data.blockades} puntos críticos detectados</li>`;
                }

            } catch(e) {
                console.error("Error fetching dashboard data:", e);
            }
        }

        async function fetchMapPoints() {
            try {
                const res = await fetch(`${API_URL}/map_points`);
                const data = await res.json();
                
                data.points.forEach(p => {
                    const cat = categorias[p.tipo] || categorias['aire']; // default
                    const esBloqueo = p.tipo === 'bloqueo';
                    const icono = L.divIcon({
                        className: `custom-icon ${esBloqueo ? 'icon-bloqueo' : ''}`,
                        html: `<i class="fa-solid ${cat.icon}"></i>`,
                        iconSize: [30, 30],
                        style: `background-color: ${cat.color};`
                    });
                    L.marker([p.lat, p.lng], {icon: icono}).bindPopup(`<b>${p.titulo}</b><br>${p.desc}`).addTo(cat.capa);
                });
            } catch(e) {
                console.error("Error fetching map points:", e);
            }
        }

        // --- 3. Map Initialization ---
        const map = L.map('map').setView([-16.5000, -68.1193], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

        const categorias = {
            fuego: { color: '#FF0000', icon: 'fa-fire', nombre: 'Incendio', capa: L.layerGroup().addTo(map) },
            sismo: { color: '#8B4513', icon: 'fa-house-crack', nombre: 'Sismo', capa: L.layerGroup().addTo(map) },
            aire: { color: '#800080', icon: 'fa-wind', nombre: 'Calidad del Aire', capa: L.layerGroup().addTo(map) },
            bloqueo: { color: '#000000', icon: 'fa-person-through-window', nombre: 'Bloqueo', capa: L.layerGroup().addTo(map) }
        };

        const filterPanel = L.control({position: 'topright'});
        filterPanel.onAdd = function() {
            const div = L.DomUtil.create('div', 'filter-panel');
            div.innerHTML = '<strong>Filtros:</strong><br>';
            Object.keys(categorias).forEach(key => {
                const cat = categorias[key];
                const label = L.DomUtil.create('label', 'filter-item', div);
                const check = L.DomUtil.create('input', '', label);
                check.type = 'checkbox'; check.checked = true;
                check.onclick = function() { this.checked ? map.addLayer(cat.capa) : map.removeLayer(cat.capa); };
                label.innerHTML += `<i class="fa-solid ${cat.icon}" style="color:${cat.color}; margin: 0 10px;"></i> ${cat.nombre}`;
            });
            return div;
        };
        filterPanel.addTo(map);

        // Fetch data on load
        fetchDashboardData();
        fetchMapPoints();

        // --- 4. Misc Logic ---
        const municipiosBolivia = {
            "La Paz": ["La Paz", "El Alto", "Viacha", "Copacabana", "Caranavi", "Coroico", "Achacachi", "Mecapaca", "Palca", "Patacamaya"],
            "Santa Cruz": ["Santa Cruz de la Sierra", "Montero", "Warnes", "Cotoca", "Samaipata", "San Ignacio de Velasco", "Yapacaní", "Camiri"]
        };

        const select = document.getElementById('municipio-select');
        for (const [depto, munis] of Object.entries(municipiosBolivia)) {
            const group = document.createElement('optgroup');
            group.label = depto;
            munis.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.toLowerCase().replace(/\s+/g, '-');
                opt.textContent = m;
                group.appendChild(opt);
            });
            select.appendChild(group);
        }

        const alertBanner = document.getElementById('alert-banner');
        const alertText = document.getElementById('alert-text');
        select.addEventListener('change', (e) => {
            alertText.innerHTML = `Viendo datos para <strong>${e.target.options[e.target.selectedIndex].text}</strong>.`;
            alertBanner.style.display = 'flex';
            // In a real app, map.setView() would center on the selected municipality here
        });

        document.getElementById('theme-btn').addEventListener('click', (e) => {
            const html = document.documentElement;
            const icon = e.currentTarget.querySelector('i');
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            icon.className = isDark ? 'ph ph-moon' : 'ph ph-sun';
            
            // Adjust map colors for dark mode if needed
            if (isDark) {
                document.querySelector('.leaflet-layer').style.filter = "invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%)";
            } else {
                document.querySelector('.leaflet-layer').style.filter = "none";
            }
        });
    </script>
</body>
</html>
