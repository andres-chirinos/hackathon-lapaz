resources:
  - name: Compilación de datos de sismología de Bolivia
    type: table
    path: data/sismology/sismology.csv
    scheme: file
    format: csv
    mediatype: text/csv
    encoding: utf-8
    schema:
      fields:
        - name: enlace_detalle
          type: string
          description: Enlace al detalle del sismo
        - name: magnitud
          type: number
          description: Magnitud del sismo
        - name: region_base
          type: string
          description: Región base del sismo
        - name: profundidad
          type: number
          description: Profundidad del sismo
        - name: distancia_epicentral
          type: string
          description: Distancia epicentral del sismo
        - name: observaciones
          type: string
          description: Observaciones adicionales
        - name: responsable
          type: string
          description: Responsable del registro
        - name: referencias
          type: string
          description: Referencias del registro
        - name: fecha_hora_registro
          type: datetime
          description: Fecha y hora del registro
        - name: latitud
          type: number
          description: Latitud del sismo
        - name: longitud
          type: number
          description: Longitud del sismo
        - name: fuente
          type: string
          description: Fuente de los datos
